# Cloud Build → Cloud Run deploy for an RCRT console app.
#
# The platform deploy pipeline (studio `project deploy`) passes the workspace
# connection as build-args (resolved from the project's .env). Firebase args
# are optional — when unset the app runs in API-key mode (the studio preview's
# default). Build runs a FULL `npm run build` (tsc && vite build) so the kit +
# app config typecheck before an image is produced.

substitutions:
  _TAG: latest
  _API_URL: ''
  _TENANT_ID: ''
  _FIREBASE_AUTH_DOMAIN: ''
  _FIREBASE_PROJECT_ID: ''

steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --build-arg VITE_API_URL="$_API_URL" \
          --build-arg VITE_TENANT_ID="$_TENANT_ID" \
          --build-arg VITE_FIREBASE_AUTH_DOMAIN="$_FIREBASE_AUTH_DOMAIN" \
          --build-arg VITE_FIREBASE_PROJECT_ID="$_FIREBASE_PROJECT_ID" \
          -t gcr.io/$PROJECT_ID/rcrt-console:$_TAG \
          -t gcr.io/$PROJECT_ID/rcrt-console:latest \
          .

images:
  - gcr.io/$PROJECT_ID/rcrt-console:$_TAG
  - gcr.io/$PROJECT_ID/rcrt-console:latest

options:
  machineType: E2_HIGHCPU_8

timeout: 1200s
